<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Cyber Word Invaders - a fast typing defense game"
    />
    <title>MJR Blaster</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="playfield">
        <div id="hud">
          <div id="hud-level" class="hud-item"></div>
          <div id="hud-threats" class="hud-item"></div>
          <div id="hud-score" class="hud-item"></div>
        </div>
        <div id="current-input"></div>
        <div id="word-layer"></div>
        <div id="explosion-layer"></div>
        <div id="level-up" class="hidden"></div>
        <div id="overlay" class="hidden"></div>
      </div>
    </div>
    <script type="module" src="game.js"></script>
  </body>
</html>
